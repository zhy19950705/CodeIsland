name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  update-homebrew:
    runs-on: ubuntu-latest
    steps:
      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Download DMG from release
        run: |
          curl -L \
            "https://guandata-autotest-report.oss-cn-hangzhou.aliyuncs.com/cdn/superIsland/SuperIsland-${VERSION}.dmg" \
            -o SuperIsland.dmg

      - name: Compute SHA256
        run: echo "SHA256=$(sha256sum SuperIsland.dmg | awk '{print $1}')" >> $GITHUB_ENV

      - name: Clone homebrew-tap
        run: |
          git clone "https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/wxtsky/homebrew-tap.git" homebrew-tap

      - name: Update Cask formula
        run: |
          mkdir -p homebrew-tap/Casks
          cat > homebrew-tap/Casks/superisland.rb <<'CASK_EOF'
          cask "superisland" do
            version "VERSION_PLACEHOLDER"
            sha256 "SHA256_PLACEHOLDER"

            url "https://guandata-autotest-report.oss-cn-hangzhou.aliyuncs.com/cdn/superIsland/SuperIsland-#{version}.dmg"
            name "SuperIsland"
            desc "Menu bar companion for Claude Code, Codex, Gemini CLI and more"
            homepage "https://github.com/wxtsky/SuperIsland"

            app "SuperIsland.app"

            zap trash: [
              "~/.superisland",
            ]
          end
          CASK_EOF
          sed -i "s/VERSION_PLACEHOLDER/${VERSION}/" homebrew-tap/Casks/superisland.rb
          sed -i "s/SHA256_PLACEHOLDER/${SHA256}/" homebrew-tap/Casks/superisland.rb
          sed -i 's/^          //' homebrew-tap/Casks/superisland.rb

      - name: Commit and push to homebrew-tap
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/superisland.rb
          git diff --cached --quiet && exit 0
          git commit -m "Update superisland to ${VERSION}"
          git push
